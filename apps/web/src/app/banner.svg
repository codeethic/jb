<svg xmlns="http://www.w3.org/2000/svg" width="360" height="80" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- Icon mark — fork + sparkle in rounded square -->
  <rect x="8" y="10" width="60" height="60" rx="14" fill="url(#iconBg)"/>

  <!-- Fork tines -->
  <line x1="26" y1="22" x2="26" y2="36" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="22" x2="33" y2="36" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fork connecting arc -->
  <path d="M26 36 Q26 40 29.5 40 Q33 40 33 36" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Fork handle -->
  <path d="M29.5 40 L29.5 56" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Sparkle — feature highlight -->
  <g transform="translate(50,28)">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8Z" fill="#fff" opacity="0.95"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(47,48)">
    <path d="M0,-3 L0.8,-0.8 L3,0 L0.8,0.8 L0,3 L-0.8,0.8 L-3,0 L-0.8,-0.8Z" fill="#fff" opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="44" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="30" fill="url(#textGrad)" letter-spacing="-0.8">
    Feature<tspan font-weight="400" fill="#78716c">Board</tspan>
  </text>

  <!-- Tagline -->
  <text x="83" y="60" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="600" font-size="11" fill="#a8a29e" letter-spacing="2">
    DAILY SPECIALS &amp; FEATURES
  </text>

  <!-- Accent dots -->
  <circle cx="82" cy="68" r="2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="90" cy="68" r="2" fill="#d97706" opacity="0.4"/>
  <circle cx="98" cy="68" r="2" fill="#b45309" opacity="0.25"/>
</svg>
