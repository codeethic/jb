<svg xmlns="http://www.w3.org/2000/svg" width="360" height="80" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Icon square -->
  <rect x="8" y="12" width="56" height="56" rx="12" fill="url(#bgGrad)"/>

  <!-- Stylized menu board lines inside icon -->
  <rect x="20" y="26" width="20" height="3" rx="1.5" fill="#fde68a" opacity="0.9"/>
  <rect x="20" y="33" width="14" height="3" rx="1.5" fill="#fde68a" opacity="0.6"/>
  <rect x="20" y="40" width="18" height="3" rx="1.5" fill="#fde68a" opacity="0.9"/>
  <rect x="20" y="47" width="12" height="3" rx="1.5" fill="#fde68a" opacity="0.6"/>

  <!-- Sparkle / star accent (representing a "feature") -->
  <g transform="translate(48, 24)" fill="#fbbf24">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" opacity="0.95"/>
  </g>

  <!-- App name -->
  <text x="80" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="28" fill="#b45309" letter-spacing="-0.5">
    Feature<tspan fill="#92400e">Board</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="58" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="11" fill="#a8a29e" letter-spacing="1.5">
    DAILY SPECIALS &amp; FEATURES
  </text>

  <!-- Decorative bottom accent line -->
  <rect x="80" y="64" width="60" height="2" rx="1" fill="url(#accentGrad)" opacity="0.7"/>
</svg>
