  <line x1="10" y1="7" x2="10" y2="14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14" y1="7" x2="14" y2="14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
